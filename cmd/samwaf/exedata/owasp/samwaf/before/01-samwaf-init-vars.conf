# =============================================================================
# SamWaf Layer 1 — CRS 字符串/列表型变量初始化
# 文件：data/owasp/samwaf/before/01-samwaf-init-vars.conf
# 由 SamWaf 随版本发布，本文件会在 SamWaf 升级时被覆盖。
# 用户如需覆盖，请通过 后台 → OWASP 规则管理 → 全局调参 → 自定义 CRS 变量 操作，
# 系统会将覆盖值写入 overrides/05-user-vars.conf（永不被升级覆盖）。
#
# 【设计原则】
#   本文件采用"宽松默认值"策略，覆盖大多数现代 Web / REST API 场景。
#   若业务需要更严格的限制，可通过后台覆盖对应变量，无需修改本文件。
#
# 加载顺序：
#   00-samwaf-base.conf (990001-990009)   ← 数值型变量（paranoia/threshold）
#   本文件 (991001-991099)                 ← 字符串/列表型变量（methods/content-type 等）
#   overrides/05-user-vars.conf           ← 用户覆盖层（最终胜出）
#   coreruleset/rules/REQUEST-901-INITIALIZATION.conf rule:901160
#     → 检测"变量未设置"时才写默认值，本文件已提前 setvar，901160 会跳过。
#
# ID 范围：991001–991099（SamWaf Layer 1 before-hooks，CRS 安全区）
# =============================================================================

# 允许的 HTTP 方法（CRS rule 911100 依赖此变量）
# 包含 REST API 常用的 PUT / DELETE；如需禁用请通过后台写入 05-user-vars.conf
SecAction \
    "id:991001,\
    phase:1,\
    pass,\
    nolog,\
    t:none,\
    tag:'SamWaf_layer1',\
    setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PATCH PUT DELETE'"

# 允许的请求体 Content-Type（CRS rule 920420 依赖此变量）
# 在官方基础上加入 text/plain / application/octet-stream / ld+json 等现代常见类型
SecAction \
    "id:991002,\
    phase:1,\
    pass,\
    nolog,\
    t:none,\
    tag:'SamWaf_layer1',\
    setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |multipart/related| |text/xml| |application/xml| |application/soap+xml| |application/json| |application/cloudevents+json| |application/cloudevents-batch+json| |application/ld+json| |application/x-json| |text/plain| |application/octet-stream|'"

# 允许的 Content-Type 字符集（CRS rule 920480 依赖此变量）
# 加入 utf-16 / gbk / gb2312 / big5，兼容中文及多语言站点
SecAction \
    "id:991003,\
    phase:1,\
    pass,\
    nolog,\
    t:none,\
    tag:'SamWaf_layer1',\
    setvar:'tx.allowed_request_content_type_charset=utf-8|utf-16|iso-8859-1|iso-8859-15|windows-1252|us-ascii|gbk|gb2312|big5'"

# 允许的 HTTP 版本（CRS rule 920430 依赖此变量）
SecAction \
    "id:991004,\
    phase:1,\
    pass,\
    nolog,\
    t:none,\
    tag:'SamWaf_layer1',\
    setvar:'tx.allowed_http_versions=HTTP/1.0 HTTP/1.1 HTTP/2 HTTP/2.0 HTTP/3 HTTP/3.0'"

# 单请求最大参数数量（CRS rule 920271 依赖此变量）
# 官方默认 255；1000 兼容参数较多的富前端页面
SecAction \
    "id:991005,\
    phase:1,\
    pass,\
    nolog,\
    t:none,\
    tag:'SamWaf_layer1',\
    setvar:'tx.max_num_args=1000'"

# 单参数值最大长度（字节，CRS rule 920271 依赖此变量）
# 官方默认 400；2000 适应长 token / base64 / 富文本字段
SecAction \
    "id:991006,\
    phase:1,\
    pass,\
    nolog,\
    t:none,\
    tag:'SamWaf_layer1',\
    setvar:'tx.arg_length=2000'"

# 参数总长度上限（字节，CRS rule 920271 依赖此变量）
# 官方默认 64000；1048576（1 MB）兼容大表单 / 富文本编辑器提交
SecAction \
    "id:991007,\
    phase:1,\
    pass,\
    nolog,\
    t:none,\
    tag:'SamWaf_layer1',\
    setvar:'tx.total_arg_length=1048576'"
