# =============================================================================
# SamWaf Layer 2 — After-CRS 钩子示例
# 文件位置：data/owasp/samwaf/after/
# =============================================================================
#
# 【用途】
#   本目录下的 .conf 文件在 CRS rules/*.conf 之后、用户 overrides 之前加载，
#   适合放置需要"在 CRS 评分完成后"再做处理的指令：
#     - 基于累积评分的自定义动作（如评分超过某阈值时记录日志）
#     - SamWaf 特有的补丁规则（修复 CRS 漏报）
#     - 对响应体做额外检测
#
# 【加载顺序（完整）】
#   coraza.conf
#   → coreruleset/crs-setup.conf
#   → samwaf/00-samwaf-base.conf       (Layer 2 数值变量)
#   → samwaf/before/*.conf             (Layer 2 前置，见 before/ 目录)
#   → overrides/05-user-vars.conf      (Layer 3 用户变量)
#   → coreruleset/rules/*.conf         (CRS 官方规则，Layer 1)
#   → samwaf/after/*.conf              ← 本目录，此处
#   → overrides/10-disabled-rules.conf (Layer 3 用户禁用)
#   → overrides/20-custom-rules.conf   (Layer 3 用户改写)
#
# 【注意事项】
#   1. 本目录由 SamWaf 开发团队管理，随 SamWaf 版本发布更新（非用户层）。
#   2. 在此处使用 SecRuleRemoveById 无效（CRS 规则已执行完毕）；
#      需要禁用 CRS 规则请放到 before/ 目录或使用 SecRuleRemoveTargetById。
#   3. .conf.example 文件不会被加载；将其复制为 .conf 后才生效。
#
# 【写法示例】
#
# ID 使用 991100-991199 段（Layer 2 after-hooks 专用）
#
# -- 示例 1：SamWaf 补充检测——检测 Log4Shell（额外保险层）--
#
# SecRule REQUEST_HEADERS|ARGS|REQUEST_BODY \
#     "@rx (?i)\$\{.*j.*n.*d.*i.*:" \
#     "id:991100,\
#     phase:2,\
#     deny,\
#     status:403,\
#     log,\
#     auditlog,\
#     msg:'SamWaf: Log4Shell attempt',\
#     severity:'CRITICAL',\
#     tag:'SamWaf_layer2',\
#     tag:'attack-injection'"
#
#
# -- 示例 2：在评分超过阈值但未触发 block 时记录警告日志 --
#
# SecRule TX:ANOMALY_SCORE "@ge 3" \
#     "id:991101,\
#     phase:5,\
#     pass,\
#     log,\
#     noauditlog,\
#     msg:'SamWaf: elevated anomaly score %{tx.anomaly_score}',\
#     tag:'SamWaf_layer2'"
#
# =============================================================================
