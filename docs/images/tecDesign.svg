<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="1220" viewBox="0 0 1560 1220" font-family="Microsoft YaHei, PingFang SC, Noto Sans SC, sans-serif">
  <rect width="1560" height="1220" fill="#ffffff"/>

