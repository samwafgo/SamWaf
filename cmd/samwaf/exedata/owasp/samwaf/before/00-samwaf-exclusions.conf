# =============================================================================
# SamWaf Layer 2 — Before-CRS 钩子示例
# 文件位置：data/owasp/samwaf/before/
# =============================================================================
#
# 【用途】
#   本目录下的 .conf 文件在 CRS rules/*.conf 之前加载，
#   适合放置需要"抢在 CRS 规则执行前"生效的指令：
#     - 已知误报的全局排除（SecRuleRemoveTargetById）
#     - 白名单 IP / User-Agent
#     - 为特定路径提前 setvar
#
# 【加载顺序（完整）】
#   coraza.conf
#   → coreruleset/crs-setup.conf
#   → samwaf/before/*.conf             ← 本目录，此处（00-samwaf-base.conf 数值变量按字母序最先加载）
#   → overrides/05-user-vars.conf      (Layer 3 用户变量，优先级最高)
#   → coreruleset/rules/*.conf         (CRS 官方规则，Layer 1)
#   → samwaf/after/*.conf              (Layer 2 后置，见 after/ 目录)
#   → overrides/10-disabled-rules.conf (Layer 3 用户禁用)
#   → overrides/20-custom-rules.conf   (Layer 3 用户改写)
#
# 【注意事项】
#   1. 本目录由 SamWaf 开发团队管理，随 SamWaf 版本发布更新（非用户层）。
#   2. 用户自定义排除请使用 overrides/ 目录（通过后台界面操作），
#      这样升级不会丢失用户设置。
#   3. .conf.example 文件不会被加载；将其复制为 .conf 后才生效。
#
# 【写法示例】
#
# -- 示例 1：对某个规则 ID 排除特定请求参数（全局误报修复）--
#
# # 排除 SQL 注入规则对 "search" 参数的检测（已知该参数允许含 SQL 关键字）
# SecRuleRemoveTargetById 942100 "ARGS:search"
#
#
# -- 示例 2：对某个 URL 路径完全跳过 CRS 检测 --
# ID 使用 991050-991099 段（Layer 1 before 自定义排除专用，避免与 01-samwaf-init-vars.conf 的 991001-991049 冲突）
#
# SecRule REQUEST_URI "@beginsWith /api/webhook/" \
#     "id:991050,\
#     phase:1,\
#     pass,\
#     nolog,\
#     t:none,\
#     ctl:ruleEngine=DetectionOnly"
#
#
# -- 示例 3：白名单内网 IP，跳过所有 CRS 规则 --
#
# SecRule REMOTE_ADDR "@ipMatch 192.168.0.0/16,10.0.0.0/8" \
#     "id:991051,\
#     phase:1,\
#     pass,\
#     nolog,\
#     t:none,\
#     ctl:ruleEngine=Off"
#
# =============================================================================
