version: '3.8'

services:
  samwaf-instance:
    image: samwaf/samwaf
    container_name: samwaf-instance
    ports:
      - "26666:26666"
      - "80:80"
      - "443:443"
    volumes:
      - ./conf:/app/conf
      - ./data:/app/data
      - ./logs:/app/logs
      - ./ssl:/app/ssl

    # “防火墙IP封禁”功能需要操作 iptables 的权限
    cap_add:
      - NET_ADMIN
    # 若要让防火墙封禁对宿主机流量真正生效，需共享宿主网络命名空间：
    # 取消下面一行的注释，并同时注释掉上面的 ports 与 networks 配置
    # network_mode: host
    networks:
      - samwafnet
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    networks:
      - samwafnet
    restart: always

networks:
  samwafnet:
    external: false
