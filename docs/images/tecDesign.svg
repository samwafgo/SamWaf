  <rect x="888" y="198" width="260" height="56" rx="8" fill="#ffffff" stroke="#a9c4e4"/>
  <text x="1018" y="221" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2b3844">TCP/UDP 隧道</text>
  <text x="1018" y="242" text-anchor="middle" font-size="11.5" fill="#6b7886">四层转发 · IP/时段控制</text>

  <!-- 箭头: 接入层 → 检测引擎 -->
