  <text x="912" y="433" text-anchor="middle" font-size="12.5" fill="#333f4d">扫描器识别</text>
  <rect x="992" y="412" width="145" height="32" rx="6" fill="#ffffff" stroke="#c6cfd9"/>
  <text x="1064" y="433" text-anchor="middle" font-size="12.5" fill="#333f4d">目录穿越</text>
